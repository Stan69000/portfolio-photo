name: Build & Deploy → O2Switch

on:
  push:
    branches: [main]
  workflow_dispatch: # permet de déclencher manuellement depuis GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Deploy site via FTP → O2Switch
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Prépare admin-server pour déploiement
        run: |
          mkdir -p ./admin-deploy
          cp admin-server.js ./admin-deploy/
          cp package.json ./admin-deploy/
          cp package-lock.json ./admin-deploy/

      - name: Deploy admin-server via FTP → O2Switch
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./admin-deploy/
          server-dir: ${{ secrets.FTP_ADMIN_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Restart Passenger (curl FTP → tmp/restart.txt)
        run: |
          echo "${{ github.run_id }}-${{ github.run_attempt }}" | curl -s \
            --ftp-create-dirs \
            -T - \
            "ftp://${{ secrets.FTP_SERVER }}${{ secrets.FTP_ADMIN_DIR }}tmp/restart.txt" \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            || echo "FTP restart skipped (non bloquant)"
