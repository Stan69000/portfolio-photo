backend:
  name: git-gateway
  branch: main

local_backend: true
display_url: "https://stunning-sawine-d32a00.netlify.app"

site_url: https://stunning-sawine-d32a00.netlify.app
logo_url: /favicon.svg

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "photos"
    label: "Photos"
    folder: "src/content/photos"
    create: true
    extension: "yaml"
    format: "yaml"
    identifier_field: "slug"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - label: "Series"
        name: "series"
        widget: "relation"
        collection: "series"
        search_fields: ["name", "slug"]
        value_field: "slug"
        display_fields: ["name", "slug"]
      - { label: "URL", name: "url", widget: "string", hint: "URL publique O2Switch" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false, default: [], hint: "Exemples: lune, street, noir-et-blanc" }
      - { label: "Note interne", name: "rating", widget: "number", required: false, value_type: "float", min: 0, max: 5, step: 0.1, hint: "Suivi éditorial interne (0 à 5)." }
      - label: "Exif"
        name: "exif"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Camera", name: "camera", widget: "string", required: false }
          - { label: "Lens", name: "lens", widget: "string", required: false }
          - { label: "Settings", name: "settings", widget: "string", required: false }
          - { label: "ISO", name: "iso", widget: "string", required: false }
      - { label: "Price", name: "price", widget: "number", value_type: "float", required: false }
      - { label: "For Sale", name: "for_sale", widget: "boolean", default: false }

  - name: "series"
    label: "Series"
    folder: "src/content/series"
    create: true
    extension: "yaml"
    format: "yaml"
    identifier_field: "slug"
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Cover URL", name: "cover_url", widget: "string" }
      - { label: "Published", name: "published", widget: "boolean", default: true }

  - name: "settings"
    label: "Settings"
    files:
      - label: "Site Settings"
        name: "site"
        file: "src/content/settings/site.yaml"
        fields:
          - { label: "Site title", name: "site_title", widget: "string" }
          - { label: "Watermark name", name: "watermark_name", widget: "string" }
          - { label: "About text", name: "about_text", widget: "text" }
